obi_market_maker:
  enabled: true
  symbols:
    - BTC-USDT-SWAP
  # Order book depth to use for multi-level OBI
  depth: 5
  # Exponential decay weight for multi-level OFI: w_k = exp(-alpha * k)
  alpha_decay: 0.5
  # EWMA half-life in milliseconds for OFI smoothing
  ewma_halflife_ms: 200
  # Minimum OBI threshold to generate a signal (avoid noise)
  obi_threshold: 0.15
  # Alpha coefficient: fair_value = mid + c_alpha * ewma_ofi
  c_alpha: 100.0
  # Multi-level OFI alpha weight; 0 disables the research synthesis extension
  mlofi_weight: 1.0
  # Quote refresh interval in milliseconds
  refresh_interval_ms: 500
  # Maximum inventory in contracts before cancelling that side
  max_inventory: 50
  # td_mode: cross | isolated
  td_mode: cross

as_market_maker:
  enabled: true
  symbols:
    - BTC-USDT-SWAP
    - ETH-USDT-SWAP
  # Risk aversion parameter (higher = wider spread, less inventory risk)
  gamma: 0.1
  # Lookback window in minutes for realized vol estimation
  sigma_lookback_min: 5
  # Order arrival intensity decay (higher k = tighter spread, more competition)
  kappa: 1.5
  # Maximum inventory in contracts (both sides)
  max_pos_contracts: 50
  # Alpha coefficient for OFI signal integration
  c_alpha: 100.0
  # Multi-level OFI feature controls
  mlofi_depth: 5
  mlofi_decay: 0.5
  mlofi_weight: 1.0
  # VPIN spread scaling factor: spread *= (1 + beta_vpin * max(vpin - 0.4, 0))
  beta_vpin: 2.0
  # VPIN size throttles; VPIN remains directionless
  elevated_size_multiplier: 0.5
  toxic_size_multiplier: 0.25
  # VPIN bucket size as fraction of estimated daily volume (1/N)
  vpin_bucket_divisor: 75
  # VPIN rolling window (number of buckets)
  vpin_window: 50
  # Quote refresh interval in milliseconds
  refresh_interval_ms: 500
  # Recalibrate kappa from recent trade data every N seconds
  kappa_recal_interval_secs: 3600
  td_mode: cross

funding_carry:
  enabled: true
  perp_symbol: BTC-USDT-SWAP
  spot_symbol: BTC-USDT
  # Minimum annualized APR to enter a carry position (12%)
  min_apr_threshold: 0.12
  # Rebalance spot/perp notional if they drift more than this fraction
  rebalance_drift_threshold: 0.02
  # Block entry if perp/spot basis z-score is already too extreme
  max_abs_basis_z: 2.5
  # Block entry if open-interest/crowding proxy exceeds this percentile
  max_crowding: 0.85
  # Check funding rate every N seconds (REST poll between WS updates)
  funding_check_interval_secs: 300
  td_mode: cross

pairs_trading:
  enabled: false
  symbol_y: ETH-USDT-SWAP
  symbol_x: BTC-USDT-SWAP
  # Kalman filter process noise (controls how fast beta drifts)
  kalman_delta: 0.0001
  # Z-score entry threshold
  entry_z: 2.0
  # Z-score exit threshold
  exit_z: 0.3
  # Z-score emergency stop-loss threshold
  stop_z: 4.0
  # Lookback for OU parameter estimation in hours
  lookback_hours: 168
  # Block entries if OU half-life is slower than this many hours.
  # Strategy converts bar observations into hours before comparing.
  max_half_life_hours: 48.0
  # Block entries if Kalman hedge-ratio covariance is too large
  max_hedge_uncertainty: 10.0
  td_mode: cross

ma_crossover:
  enabled: true
  symbols:
    - BTC-USDT-SWAP
  fast_window: 20
  slow_window: 50
  # Default false keeps indicator artifacts aligned with strategy cold-start semantics.
  indicator_db_warmup: false
  td_mode: cross

ema_crossover:
  enabled: true
  symbols:
    - BTC-USDT-SWAP
  fast_span: 20
  slow_span: 50
  # Opt in only when visual continuity is preferred over marker/strategy parity.
  indicator_db_warmup: false
  td_mode: cross

macd_crossover:
  enabled: true
  symbols:
    - BTC-USDT-SWAP
  fast_span: 12
  slow_span: 26
  signal_span: 9
  # Opt in only when visual continuity is preferred over marker/strategy parity.
  indicator_db_warmup: false
  td_mode: cross

fear_greed_sentiment:
  enabled: false
  symbol: BTC-USDT-SWAP
  dataset_id: fear_greed_btc
  # Required feature: stale or missing values produce no signal.
  max_age_seconds: 172800
  extreme_fear_label: Extreme Fear
  exit_labels:
    - Greed
    - Extreme Greed
  # Numeric thresholds are a fallback if the upstream label spelling drifts.
  extreme_fear_threshold: 25.0
  exit_value_threshold: 51.0
  max_missing_signal_ratio: 0.05
  max_stale_signal_ratio: 0.05
  td_mode: cross

cme_gap_fill:
  enabled: false
  symbol: BTC-USDT-SWAP
  dataset_id: cme_btc1_continuous
  # Required feature: stale or missing CME observations produce no signal.
  # Daily CME observations are a delayed research baseline, not real-time gap-fill.
  max_age_seconds: 604800
  # Dust-bucket exclusion: gaps below ~25 bps are too close to round-trip costs.
  min_gap_bps: 25.0
  # 73% of proxy fills land within day 1; day 2 keeps a small buffer.
  max_hold_days: 2.0
  # Caps adverse move at 1.5x the detected gap; 0 disables stop-loss.
  stop_loss_bps_mult: 1.5
  # Optional oversize-gap filter; 0 disables upper bound.
  max_gap_bps: 0.0
  # both | long_only (down-gaps only) | short_only (up-gaps only)
  allow_direction: both
  roll_dates: []
  max_missing_signal_ratio: 0.05
  max_stale_signal_ratio: 0.05
  td_mode: cross
